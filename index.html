<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENDLESS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: #fff;
}

/* HERO */
.hero {
  height: 90vh;
  background: 
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  font-size: 4rem;
  letter-spacing: 6px;
}

.hero p {
  color: #aaa;
  margin: 10px 0 20px;
}

/* BUTTON */
.btn {
  background: #d7ff2f;
  color: #000;
  padding: 15px 25px;
  text-decoration: none;
  letter-spacing: 2px;
  border-radius: 6px;
  font-weight: bold;
}

/* PRODUCTS */
.products {
  padding: 80px 20px;
  background: #0b0b0b;
  text-align: center;
}

.products h2 {
  letter-spacing: 4px;
  margin-bottom: 40px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.product {
  background: #111;
  padding: 15px;
  border-radius: 10px;
}

.product img {
  width: 100%;
  border-radius: 8px;
}

.product h3 {
  margin: 10px 0;
}

/* FORM */
.form-section {
  padding: 80px 20px;
  display: flex;
  justify-content: center;
}

.form-box {
  width: 100%;
  max-width: 1000px;
  background: #111;
  padding: 30px;
  border-radius: 16px;
}

.form-box h2 {
  text-align: center;
  color: #d7ff2f;
  letter-spacing: 3px;
}

iframe {
  width: 100%;
  height: 1100px;
  border: none;
  border-radius: 10px;
  background: #fff;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  color: #777;
}
</style>

</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>ENDLESS</h1>
  <p>Vintage Streetwear / Custom Pieces</p>
  <a class="btn" href="#form">ORDER NOW</a>
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>FEATURED PIECES</h2>

  <div class="product-grid">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975922284-9b1c7b2b7b4b" alt="">
      <h3>ENDLESS BLACK TEE</h3>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975867597-0af37a22d8c1" alt="">
      <h3>ENDLESS HOODIE</h3>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f" alt="">
      <h3>VINTAGE DROP</h3>
    </div>

  </div>
</section>

<!-- FORM -->
<section id="form" class="form-section">
  <div class="form-box">

    <h2>CONTACT / ORDERS</h2>

    <iframe 
      src="https://docs.google.com/forms/d/e/1FAIpQLSfl_xBrVrMfxqCp9WJpVLPgA_8pgLc1OhEzDVvPm3Zwsjpkig/viewform?embedded=true">
    </iframe>

  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 ENDLESS / CODEANX6
</footer>

</body>
</html>
